name: Build CobwebTrap Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build mod
        run: ./gradlew build

      - name: Upload jar artifact
        uses: actions/upload-artifact@v3
        with:
          name: cobwebtrap-mod
          path: build/libs/cobwebtrap-*.jar
